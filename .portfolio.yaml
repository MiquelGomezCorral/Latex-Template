title:
  en: Latex Template (Enhanced)
  es: Plantilla LaTeX (Mejorada)
finished: finished
descriptionShort:
  en: Enhanced version of the UPV/ETSINF LaTeX thesis template with extended features. Git-ready with logical folder structure (chapters, images, bibliography). For Bachelor's (TFG) and Master's (TFM) theses. Template-instantiable from GitHub.
  es: Versión mejorada de la plantilla LaTeX para TFG/TFM de la UPV/ETSINF con características extendidas. Preparada para Git con estructura de carpetas lógica (capítulos, imágenes, bibliografía). Para Trabajos de Fin de Grado (TFG) y Máster (TFM). Instanciable como plantilla desde GitHub.
descriptionLong:
  en: |
    An enhanced and reorganized version of the official LaTeX thesis template from ETSINF at Universitat Politècnica de València (UPV). Extends the simplified version with additional features while maintaining compliance with university formatting standards. Organized into logical directories for chapters, images, and bibliography. Key improvements over the raw university files include: Git-ready setup with pre-configured .gitignore, better folder organization, and GitHub template functionality for instant repository creation. Compatible with modern LaTeX IDEs and synctex for side-by-side editing.
  es: |
    Una versión mejorada y reorganizada de la plantilla LaTeX oficial para TFG/TFM de la ETSINF de la Universitat Politècnica de València (UPV). Extiende la versión simplificada con características adicionales manteniendo la conformidad con los estándares de formato universitario. Organizada en directorios lógicos para capítulos, imágenes y bibliografía. Las mejoras principales respecto a los archivos originales incluyen: configuración Git con .gitignore preconfigurado, mejor organización de carpetas, y funcionalidad de plantilla GitHub para creación instantánea de repositorios. Compatible con IDEs LaTeX modernos y synctex para edición lado a lado.
